name: Deploy zu Hostinger (SSH/rsync)

# Lädt bei jedem Push auf main die Website-Dateien aus Code/ per rsync über SSH auf den
# Hostinger-Webspace und erzeugt vorher Code/api/config.php aus den Secrets (nie im Repo).
#
# Nötige Repo-Secrets (Settings → Secrets and variables → Actions):
#   SSH_PRIVATE_KEY, SSH_HOST, SSH_USER, SSH_TARGET – SSH-Deploy (Key-basiert)
#   DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASS – MySQL-Datenbank
#   ADMIN_PASS – Passwort für den Freigabe-Bereich (admin.php)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: PHP-Syntax prüfen (Lint vor Deploy)
        run: |
          fail=0
          for f in $(find Code -name '*.php'); do
            php -l "$f" || fail=1
          done
          if [ "$fail" -ne 0 ]; then echo "::error::PHP-Syntaxfehler – Deploy abgebrochen"; exit 1; fi
          echo "PHP-Lint OK – alle Dateien syntaktisch sauber"

      - name: Code/api/config.php aus Secrets erzeugen
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
        run: |
          php -r '$k=["DB_HOST","DB_PORT","DB_NAME","DB_USER","DB_PASS","ADMIN_PASS"];$c=[];foreach($k as $x){$c[$x]=getenv($x);}file_put_contents("Code/api/config.php","<?php return ".var_export($c,true).";\n");'
          echo "config.php erzeugt ($(wc -c < Code/api/config.php) Bytes)"

      - name: Per rsync über SSH hochladen (Code/ -> Hostinger public_html)
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          REMOTE_PORT: "65002"
          SOURCE: "Code/"
          TARGET: ${{ secrets.SSH_TARGET }}
          ARGS: "-rltgoDzvO --delete"
          # Server-Daten NICHT anfassen: hochgeladene Fotos, lokale Testdaten, Sample-Config
          EXCLUDE: "/uploads/, /api/data/, /api/config.sample.php"
