name: Deploy zu Dogado (FTPS)

# Lädt bei jedem Push auf main alle Website-Dateien per FTPS auf den Dogado-Webspace
# und erzeugt vorher api/config.php aus den DB-/Admin-Secrets (nie im Repo).
#
# Nötige Repo-Secrets (Settings → Secrets and variables → Actions):
#   FTP_SERVER, FTP_USERNAME, FTP_PASSWORD  – FTP-Zugang
#   DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASS – MySQL-Datenbank
#   ADMIN_PASS – Passwort für den Freigabe-Bereich (admin.php)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: api/config.php aus Secrets erzeugen
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
        run: |
          php -r '$k=["DB_HOST","DB_PORT","DB_NAME","DB_USER","DB_PASS","ADMIN_PASS"];$c=[];foreach($k as $x){$c[$x]=getenv($x);}file_put_contents("api/config.php","<?php return ".var_export($c,true).";\n");'
          echo "config.php erzeugt ($(wc -c < api/config.php) Bytes)"

      - name: Per FTPS hochladen
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: /
          # Uploads & lokale Testdaten NICHT anfassen/löschen; Doku nicht deployen
          exclude: |
            **/.git*
            **/.git*/**
            README.md
            ROADMAP.md
            api/config.sample.php
            api/data/**
            uploads/**
