name: Deploy zu Hostinger (SFTP + tar)

# Lädt bei jedem Push auf main die Website-Dateien aus Code/ auf den Hostinger-Webspace.
# Hostinger-Shared-SSH hat kein rsync/scp – daher: Code/ als tar packen, per SFTP als
# EINE Datei hochladen und per SSH auf dem Server entpacken (tar/gzip sind dort vorhanden).
# config.php wird vorher aus den Secrets erzeugt (nie im Repo).
#
# Nötige Repo-Secrets:
#   SSH_PRIVATE_KEY, SSH_HOST, SSH_USER, SSH_TARGET – Deploy (Key-basiert)
#   DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASS – MySQL-Datenbank
#   ADMIN_PASS – Passwort für den Freigabe-Bereich (admin.php)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: PHP-Syntax prüfen (Lint vor Deploy)
        run: |
          fail=0
          for f in $(find Code -name '*.php'); do
            php -l "$f" || fail=1
          done
          if [ "$fail" -ne 0 ]; then echo "::error::PHP-Syntaxfehler – Deploy abgebrochen"; exit 1; fi
          echo "PHP-Lint OK – alle Dateien syntaktisch sauber"

      - name: Code/api/config.php aus Secrets erzeugen
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
        run: |
          php -r '$k=["DB_HOST","DB_PORT","DB_NAME","DB_USER","DB_PASS","ADMIN_PASS"];$c=[];foreach($k as $x){$c[$x]=getenv($x);}file_put_contents("Code/api/config.php","<?php return ".var_export($c,true).";\n");'
          echo "config.php erzeugt ($(wc -c < Code/api/config.php) Bytes)"

      - name: Per SFTP hochladen (tar-Paket, per SSH entpacken)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_TARGET: ${{ secrets.SSH_TARGET }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSHOPT="-i $HOME/.ssh/deploy_key -o Port=65002 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o BatchMode=yes"
          # 1) Code/ als tar packen (inkl. .htaccess), Server-Daten ausschließen
          tar czf deploy.tar.gz -C Code --exclude=uploads --exclude=api/data --exclude=api/config.sample.php .
          echo "Paketgröße: $(du -h deploy.tar.gz | cut -f1)"
          # 2) Paket per SFTP ins Server-Home hochladen
          echo "put deploy.tar.gz deploy.tar.gz" | sftp $SSHOPT "$SSH_USER@$SSH_HOST"
          # 3) Auf dem Server in den Web-Root entpacken + aufräumen
          ssh $SSHOPT "$SSH_USER@$SSH_HOST" "cd \"$SSH_TARGET\" && tar xzf ~/deploy.tar.gz && rm -f ~/deploy.tar.gz default.php && echo 'Entpackt nach '\$(pwd)' – $(ls -1 | wc -l) Einträge'"
