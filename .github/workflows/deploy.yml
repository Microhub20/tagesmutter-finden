name: Deploy zu Hostinger (SFTP)

# Lädt bei jedem Push auf main die Website-Dateien aus Code/ per SFTP (lftp mirror) auf den
# Hostinger-Webspace und erzeugt vorher Code/api/config.php aus den Secrets (nie im Repo).
# Hostinger-Shared-SSH hat kein rsync/scp – daher SFTP über lftp.
#
# Nötige Repo-Secrets:
#   SSH_PRIVATE_KEY, SSH_HOST, SSH_USER, SSH_TARGET – SFTP-Deploy (Key-basiert)
#   DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASS – MySQL-Datenbank
#   ADMIN_PASS – Passwort für den Freigabe-Bereich (admin.php)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: PHP-Syntax prüfen (Lint vor Deploy)
        run: |
          fail=0
          for f in $(find Code -name '*.php'); do
            php -l "$f" || fail=1
          done
          if [ "$fail" -ne 0 ]; then echo "::error::PHP-Syntaxfehler – Deploy abgebrochen"; exit 1; fi
          echo "PHP-Lint OK – alle Dateien syntaktisch sauber"

      - name: Code/api/config.php aus Secrets erzeugen
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
        run: |
          php -r '$k=["DB_HOST","DB_PORT","DB_NAME","DB_USER","DB_PASS","ADMIN_PASS"];$c=[];foreach($k as $x){$c[$x]=getenv($x);}file_put_contents("Code/api/config.php","<?php return ".var_export($c,true).";\n");'
          echo "config.php erzeugt ($(wc -c < Code/api/config.php) Bytes)"

      - name: Per SFTP hochladen (lftp mirror, Code/ -> Hostinger)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_TARGET: ${{ secrets.SSH_TARGET }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          lftp -c "set sftp:connect-program 'ssh -a -x -i $HOME/.ssh/deploy_key -p 65002 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'; open sftp://$SSH_USER@$SSH_HOST; mirror -R --delete --parallel=4 --exclude uploads/ --exclude api/data/ --exclude api/config.sample.php Code/ \"$SSH_TARGET\"; bye"
          echo "SFTP-Upload abgeschlossen"
